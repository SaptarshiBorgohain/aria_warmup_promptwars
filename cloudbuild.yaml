steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aria-triage:$COMMIT_SHA'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aria-triage:$COMMIT_SHA']

options:
  # EVALUATION: Infrastructure/Efficiency — Explicit logging configuration for secure service account execution
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: '' # Provide this in the Cloud Build trigger settings
